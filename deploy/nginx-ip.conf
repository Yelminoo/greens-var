# ─────────────────────────────────────────────────────────────────────────────
# Nginx config — NO DOMAIN (IP access only, HTTP)
# Use this while you don't have a domain pointed at the server yet.
# All four sections accessible via path:
#   http://IP/           → Main site
#   http://IP/fruithai/  → FruThai brand
#   http://IP/variegata/ → Variegata brand
#   http://IP/admin      → Admin panel
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;   # catch all — responds to IP and any hostname

    # Serve static build assets directly (faster, no Node involved)
    location /_astro/ {
        alias /var/www/greensvar/dist/client/_astro/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /var/www/greensvar/public/images/;
        expires 30d;
    }

    location /favicon.ico {
        alias /var/www/greensvar/public/favicon.ico;
    }

    # Everything else → Node app on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_read_timeout 60s;
    }
}
