server {
    listen 80;
    server_name greensvar.com www.greensvar.com fruithai.greensvar.com variegata.greensvar.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name greensvar.com www.greensvar.com;

    ssl_certificate     /etc/letsencrypt/live/greensvar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greensvar.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
    }
}

