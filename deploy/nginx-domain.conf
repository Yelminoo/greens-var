# ─────────────────────────────────────────────────────────────────────────────
# Nginx config — WITH DOMAIN + SSL (use after domain is pointed at server)
# Enable: sudo cp deploy/nginx-domain.conf /etc/nginx/sites-available/greensvar
#         sudo nginx -t && sudo systemctl reload nginx
# Then get SSL: sudo certbot --nginx -d greensvar.com -d www.greensvar.com \
#               -d fruithai.greensvar.com -d variegata.greensvar.com
# Then set SUBDOMAIN_ROUTING=true in .env and restart: pm2 restart greensvar
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name greensvar.com www.greensvar.com fruithai.greensvar.com variegata.greensvar.com;
    return 301 https://$host$request_uri;
}

# Main site
server {
    listen 443 ssl;
    server_name greensvar.com www.greensvar.com;

    ssl_certificate     /etc/letsencrypt/live/greensvar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greensvar.com/privkey.pem;

    location /_astro/ {
        alias /var/www/greensvar/dist/client/_astro/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /var/www/greensvar/public/images/;
        expires 30d;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
    }
}

# FruThai subdomain
server {
    listen 443 ssl;
    server_name fruithai.greensvar.com;

    ssl_certificate     /etc/letsencrypt/live/greensvar.com/fullchain.pem;
