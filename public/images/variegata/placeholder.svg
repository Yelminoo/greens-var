<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a14"/>
      <stop offset="100%" style="stop-color:#002a1e"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A9E8F;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1A9E8F;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D635;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#A8D635;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7D46"/>
      <stop offset="100%" style="stop-color:#1A9E8F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100"  r="200" fill="url(#circle1)"/>
  <circle cx="720" cy="500"  r="160" fill="url(#circle2)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- Main leaf cluster (lemongrass / herb style) -->
  <g transform="translate(400,290)">
    <!-- Back leaves -->
    <ellipse cx="-40" cy="-30" rx="12" ry="110"
             fill="url(#leaf)" opacity="0.5" transform="rotate(-28,-40,-30)"/>
    <ellipse cx="40"  cy="-30" rx="12" ry="110"
             fill="url(#leaf)" opacity="0.5" transform="rotate(28,40,-30)"/>

    <!-- Mid leaves -->
    <ellipse cx="-22" cy="-20" rx="13" ry="118"
             fill="url(#leaf)" opacity="0.75" transform="rotate(-14,-22,-20)"/>
    <ellipse cx="22"  cy="-20" rx="13" ry="118"
             fill="url(#leaf)" opacity="0.75" transform="rotate(14,22,-20)"/>

    <!-- Front centre leaf -->
    <ellipse cx="0" cy="-10" rx="14" ry="125"
             fill="#2D7D46" opacity="0.95" transform="rotate(0)"/>

    <!-- Vein lines -->
    <line x1="0" y1="-120" x2="0" y2="110" stroke="rgba(168,214,53,0.4)" stroke-width="1.5"/>
    <line x1="-20" y1="-100" x2="-22" y2="95" stroke="rgba(168,214,53,0.25)" stroke-width="1"/>
    <line x1="20"  y1="-100" x2="22"  y2="95" stroke="rgba(168,214,53,0.25)" stroke-width="1"/>

    <!-- Root base -->
    <ellipse cx="0" cy="115" rx="30" ry="10" fill="#1A9E8F" opacity="0.6"/>

    <!-- Dew drops -->
    <circle cx="-6"  cy="-60" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="8"   cy="20"  r="3" fill="rgba(255,255,255,0.2)"/>
    <circle cx="-10" cy="60"  r="2.5" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Small accent leaf — left -->
  <g transform="translate(185,330) rotate(-40)">
    <ellipse cx="0" cy="0" rx="9" ry="70" fill="#1A9E8F" opacity="0.5"/>
    <line x1="0" y1="-65" x2="0" y2="65" stroke="rgba(168,214,53,0.3)" stroke-width="1"/>
  </g>
  <g transform="translate(160,290) rotate(-55)">
    <ellipse cx="0" cy="0" rx="7" ry="55" fill="#2D7D46" opacity="0.4"/>
  </g>

  <!-- Small accent leaf — right -->
  <g transform="translate(615,240) rotate(35)">
    <ellipse cx="0" cy="0" rx="9" ry="65" fill="#1A9E8F" opacity="0.45"/>
    <line x1="0" y1="-60" x2="0" y2="60" stroke="rgba(168,214,53,0.25)" stroke-width="1"/>
  </g>
  <g transform="translate(638,270) rotate(50)">
    <ellipse cx="0" cy="0" rx="7" ry="50" fill="#2D7D46" opacity="0.35"/>
  </g>

  <!-- Label -->
  <rect x="248" y="425" width="304" height="52" rx="26" fill="rgba(26,158,143,0.15)" stroke="rgba(26,158,143,0.3)" stroke-width="1"/>
  <text x="400" y="457" font-family="Georgia,serif" font-size="17" font-weight="600"
        fill="#1A9E8F" text-anchor="middle" letter-spacing="2">Variegata</text>

  <!-- Sub-label -->
  <text x="400" y="503" font-family="monospace" font-size="12"
        fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="3">NO IMAGE</text>
</svg>
