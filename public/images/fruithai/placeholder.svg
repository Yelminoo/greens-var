<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2e14"/>
      <stop offset="100%" style="stop-color:#1a4a20"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D635;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#A8D635;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7D46;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#2D7D46;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="mangoGreen" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e64a"/>
      <stop offset="45%" style="stop-color:#7bbf2a"/>
      <stop offset="100%" style="stop-color:#3d7a10"/>
    </linearGradient>
    <linearGradient id="mangoBlush" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F4821F;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#F4821F;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D635"/>
      <stop offset="100%" style="stop-color:#2D7D46"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softDrop">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="160" cy="140"  r="220" fill="url(#glow1)" filter="url(#blur1)"/>
  <circle cx="660" cy="480"  r="180" fill="url(#glow2)" filter="url(#blur1)"/>
  <circle cx="600" cy="120"  r="100" fill="rgba(168,214,53,0.12)" filter="url(#blur2)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(168,214,53,0.06)" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- ── Background leaves ── -->
  <!-- Far left leaf -->
  <g transform="translate(80,380) rotate(-55)">
    <ellipse cx="0" cy="0" rx="14" ry="95" fill="#2D7D46" opacity="0.35"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="rgba(168,214,53,0.2)" stroke-width="1.2"/>
  </g>
  <!-- Far right leaf -->
  <g transform="translate(720,200) rotate(48)">
    <ellipse cx="0" cy="0" rx="12" ry="80" fill="#2D7D46" opacity="0.3"/>
    <line x1="0" y1="-76" x2="0" y2="76" stroke="rgba(168,214,53,0.15)" stroke-width="1"/>
  </g>
  <!-- Top right leaf -->
  <g transform="translate(660,90) rotate(22)">
    <ellipse cx="0" cy="0" rx="10" ry="65" fill="#A8D635" opacity="0.2"/>
  </g>

  <!-- ── Main mango (green fresh) ── -->
  <g transform="translate(400,272)" filter="url(#softDrop)">
    <!-- Body green -->
    <ellipse cx="0" cy="18" rx="78" ry="98" fill="url(#mangoGreen)"/>
    <!-- Blush on tip (natural ripening) -->
    <ellipse cx="0" cy="18" rx="78" ry="98" fill="url(#mangoBlush)"/>
    <!-- Shine -->
    <ellipse cx="0" cy="18" rx="78" ry="98" fill="url(#shine)"/>
    <!-- Subtle ridge line -->
    <path d="M-6,-78 Q-10,0 -4,90" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="2"/>
    <!-- Stem -->
    <rect x="-5" y="-100" width="10" height="30" rx="5" fill="#3d2800" opacity="0.9"/>
    <!-- Stem knob -->
    <circle cx="0" cy="-102" r="6" fill="#5a3a00" opacity="0.8"/>

    <!-- Leaf left -->
    <g transform="translate(-18,-94) rotate(-38)">
      <ellipse cx="0" cy="0" rx="11" ry="48" fill="url(#leafGrad)" opacity="0.95"/>
      <line x1="0" y1="-44" x2="0" y2="44" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
    </g>
    <!-- Leaf right -->
    <g transform="translate(18,-96) rotate(32)">
      <ellipse cx="0" cy="0" rx="10" ry="44" fill="url(#leafGrad)" opacity="0.9"/>
      <line x1="0" y1="-40" x2="0" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
    </g>
    <!-- Leaf centre back -->
    <g transform="translate(0,-98) rotate(5)">
      <ellipse cx="0" cy="0" rx="9" ry="52" fill="#5CB85C" opacity="0.6"/>
    </g>

    <!-- Dew drops -->
    <circle cx="-32" cy="-18" r="5" fill="rgba(255,255,255,0.28)"/>
    <circle cx="-42" cy="14"  r="3.5" fill="rgba(255,255,255,0.18)"/>
    <circle cx="36"  cy="40"  r="3" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- ── Small fruit accent — left ── -->
  <g transform="translate(188,195) scale(0.52)" filter="url(#softDrop)">
    <ellipse cx="0" cy="12" rx="58" ry="72" fill="url(#mangoGreen)" opacity="0.85"/>
    <ellipse cx="0" cy="12" rx="58" ry="72" fill="url(#mangoBlush)"/>
    <ellipse cx="0" cy="12" rx="58" ry="72" fill="url(#shine)"/>
    <rect x="-4" y="-62" width="8" height="22" rx="4" fill="#3d2800" opacity="0.8"/>
    <g transform="translate(-12,-64) rotate(-35)">
      <ellipse cx="0" cy="0" rx="8" ry="34" fill="url(#leafGrad)" opacity="0.9"/>
    </g>
    <g transform="translate(12,-66) rotate(28)">
      <ellipse cx="0" cy="0" rx="7" ry="30" fill="url(#leafGrad)" opacity="0.85"/>
    </g>
    <circle cx="-20" cy="-8" r="3.5" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- ── Small fruit accent — right ── -->
  <g transform="translate(615,360) scale(0.44)" filter="url(#softDrop)">
    <ellipse cx="0" cy="12" rx="58" ry="72" fill="url(#mangoGreen)" opacity="0.75"/>
    <ellipse cx="0" cy="12" rx="58" ry="72" fill="url(#mangoBlush)"/>
    <ellipse cx="0" cy="12" rx="58" ry="72" fill="url(#shine)"/>
    <rect x="-4" y="-62" width="8" height="22" rx="4" fill="#3d2800" opacity="0.8"/>
    <g transform="translate(-10,-64) rotate(-30)">
      <ellipse cx="0" cy="0" rx="7" ry="30" fill="url(#leafGrad)" opacity="0.9"/>
    </g>
    <g transform="translate(10,-66) rotate(25)">
      <ellipse cx="0" cy="0" rx="7" ry="28" fill="url(#leafGrad)" opacity="0.85"/>
    </g>
    <circle cx="-18" cy="-6" r="3" fill="rgba(255,255,255,0.22)"/>
  </g>

  <!-- Floating leaf sprigs -->
  <g transform="translate(290,145) rotate(-20)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="7" ry="32" fill="#A8D635"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  </g>
  <g transform="translate(520,148) rotate(18)" opacity="0.4">
    <ellipse cx="0" cy="0" rx="6" ry="26" fill="#5CB85C"/>
  </g>

  <!-- Water droplets floating -->
  <circle cx="265" cy="340" r="4" fill="rgba(168,214,53,0.4)"/>
  <circle cx="270" cy="336" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="540" cy="210" r="3.5" fill="rgba(168,214,53,0.35)"/>
  <circle cx="544" cy="207" r="1.8" fill="rgba(255,255,255,0.25)"/>

  <!-- Label pill -->
  <rect x="268" y="406" width="264" height="50" rx="25" fill="rgba(168,214,53,0.12)" stroke="rgba(168,214,53,0.35)" stroke-width="1.2"/>
  <text x="400" y="437" font-family="Georgia,serif" font-size="17" font-weight="700"
        fill="#A8D635" text-anchor="middle" letter-spacing="2.5">FruThai</text>

  <!-- Sub-label -->
  <text x="400" y="483" font-family="monospace" font-size="11"
        fill="rgba(168,214,53,0.3)" text-anchor="middle" letter-spacing="4">NO IMAGE</text>
</svg>
