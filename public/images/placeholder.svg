<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2B1E"/>
      <stop offset="100%" style="stop-color:#0e1a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7D46;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#A8D635;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="700" cy="100" r="200" fill="url(#accent)"/>
  <circle cx="100" cy="500" r="150" fill="url(#accent)" opacity="0.5"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="267" y1="0" x2="267" y2="600"/>
    <line x1="533" y1="0" x2="533" y2="600"/>
  </g>

  <!-- Leaf icon -->
  <g transform="translate(400,270)">
    <path d="M0,-90 C60,-60 80,0 60,60 C40,100 -40,100 -60,60 C-80,0 -60,-60 0,-90 Z"
          fill="#2D7D46" opacity="0.8"/>
    <path d="M0,-90 C30,-50 40,0 20,50 C10,80 0,90 0,90"
          fill="none" stroke="rgba(168,214,53,0.5)" stroke-width="2"/>
    <!-- Cross lines to indicate image missing -->
    <line x1="-30" y1="-30" x2="30" y2="30"  stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
    <line x1="30"  y1="-30" x2="-30" y2="30" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  </g>

  <!-- Label -->
  <rect x="292" y="388" width="216" height="48" rx="24" fill="rgba(45,125,70,0.15)" stroke="rgba(45,125,70,0.3)" stroke-width="1"/>
  <text x="400" y="418" font-family="Georgia,serif" font-size="15" font-weight="600"
        fill="#2D7D46" text-anchor="middle" letter-spacing="2">Greens Variegated</text>
  <text x="400" y="462" font-family="monospace" font-size="12"
        fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="3">NO IMAGE</text>
</svg>
